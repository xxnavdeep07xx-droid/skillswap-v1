name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build with Next.js
        run: bun run build

      - name: Fix asset paths for GitHub Pages
        run: |
          cd out
          # Fix image/asset paths in ALL files (HTML + JS)
          find . -type f \( -name '*.html' -o -name '*.js' \) -exec sed -i \
            -e 's|"/images/|"/skillswap-v1/images/|g' \
            -e "s|'/images/|'/skillswap-v1/images/|g" \
            -e 's|src="/images/|src="/skillswap-v1/images/|g' \
            -e 's|href="/manifest.json"|href="/skillswap-v1/manifest.json"|g' \
            -e 's|href="/images/|href="/skillswap-v1/images/|g' \
            -e "s|url('/images/|url('/skillswap-v1/images/|g" \
            -e "s|url(&#x27;/images/|url(&#x27;/skillswap-v1/images/|g" \
            {} +

      - name: Add .nojekyll
        run: touch out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
